name: PR Checks

on:
  pull_request:
    branches: [master]

jobs:
  lint-functions:
    name: ESLint (functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Run ESLint
        run: npm run lint
        working-directory: functions

      - name: Run unit tests
        run: npm test
        working-directory: functions

      - name: Audit dependencies (functions)
        run: npm audit --omit=dev --audit-level=critical
        working-directory: functions

  lint-next:
    name: ESLint (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nosso-momento-next/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nosso-momento-next

      - name: Run ESLint
        run: npm run lint
        working-directory: nosso-momento-next

  build-next:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nosso-momento-next/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nosso-momento-next

      - name: Run production build
        run: npm run build
        working-directory: nosso-momento-next
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789012"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789012:web:abcdef"
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-PLACEHOLDER

  audit-next:
    name: Audit dependencies (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nosso-momento-next/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nosso-momento-next

      - name: Audit dependencies (Next.js)
        run: npm audit --omit=dev --audit-level=critical
        working-directory: nosso-momento-next
